<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <form action="#">
        <div class="caja">  
            <h1>Registro de usuarios</h1>
            <p class="inicio">Por favor diligencie la siguiente informacion:</p>
            <P>Por favor registre su nombre</P>
            <input type="text" placeholder="name" required>
            <br>
            <p>Por favor indique su telefono</p>
            <input type="tel" placeholder="number" required>      
            <br>
            <p>Escriba su correo</p>
            <input type="email" name="gmail" id="gmail" placeholder="gmail" required>
            <br>
            <p>Escriba su contraseña</p>
            <input type="password" name="contraseña" id="contraseña" placeholder="password" required>
            <br>
            <p class="final">Gracias por rellenar el formulario de Registro</p>
            <button type="submit">Enviar</button>
        </div>    
    </form>
</body>
</html>
